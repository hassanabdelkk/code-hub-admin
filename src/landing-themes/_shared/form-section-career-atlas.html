<section id="bewerbung-form" class="ca-form-section">
  <div class="ca-form-wrap">
    <div class="ca-form-header">
      <span class="ca-form-eyebrow">Bewerbung</span>
      <h2>Ihr erster Schritt.</h2>
      <p>Wir melden uns innerhalb von 24 Stunden mit einem Termin zum Kennenlernen.</p>
    </div>
    <form id="application-form" class="ca-form" novalidate>
      <div class="ca-form-row">
        <label>Vorname<input type="text" name="first_name" required /></label>
        <label>Nachname<input type="text" name="last_name" required /></label>
      </div>
      <label>E-Mail<input type="email" name="email" required /></label>
      <label>Telefon<input type="tel" name="phone" required /></label>
      <label class="ca-form-check"><input type="checkbox" name="consent" required /><span>Ich stimme der Datenverarbeitung gemäß Datenschutzerklärung zu.</span></label>
      <button type="submit" class="ca-cta ca-form-submit">Bewerbung senden <span>→</span></button>
      <p class="ca-form-note">Ihre Daten werden vertraulich behandelt und nur für den Bewerbungsprozess verwendet.</p>
    </form>
  </div>
</section>
