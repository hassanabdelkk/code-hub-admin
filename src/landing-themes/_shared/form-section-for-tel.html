<section id="bewerbung-form" class="ft-form-section">
  <div class="ft-form-wrap">
    <div class="ft-form-intro">
      <span class="ft-form-eyebrow">// Jetzt bewerben</span>
      <h2 class="ft-form-title">Lassen Sie uns über Ihr Projekt sprechen.</h2>
      <p class="ft-form-sub">Hinterlassen Sie Ihre Daten — wir melden uns innerhalb von 24 Stunden für ein unverbindliches Erstgespräch.</p>
    </div>
    <form id="application-form" class="ft-form">
      <div class="ft-form-row">
        <label><span>Vorname</span><input name="first_name" required /></label>
        <label><span>Nachname</span><input name="last_name" required /></label>
      </div>
      <label><span>Straße &amp; Hausnummer</span><input name="street" /></label>
      <div class="ft-form-row">
        <label><span>PLZ</span><input name="postal_code" /></label>
        <label><span>Stadt</span><input name="city" /></label>
      </div>
      <label><span>Telefon</span><input name="phone" required /></label>
      <label><span>E-Mail</span><input type="email" name="email" required /></label>
      <button type="submit" class="ft-form-submit">Anfrage senden →</button>
      <p id="form-status" class="ft-form-status"></p>
    </form>
  </div>
</section>
