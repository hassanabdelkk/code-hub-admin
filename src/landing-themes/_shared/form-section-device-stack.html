<section id="bewerbung-form" class="ds-form-section">
  <div class="ds-form-wrap">
    <div class="ds-form-header">
      <span class="ds-form-eyebrow">// Kontakt</span>
      <h2>Projekt anfragen</h2>
      <p>Kurz beschreiben was Sie testen lassen möchten — wir melden uns innerhalb von 24 Stunden.</p>
    </div>
    <form id="application-form" class="ds-form" novalidate>
      <div class="ds-form-row">
        <label>Vorname<input type="text" name="first_name" required /></label>
        <label>Nachname<input type="text" name="last_name" required /></label>
      </div>
      <label>E-Mail<input type="email" name="email" required /></label>
      <label>Telefon<input type="tel" name="phone" required /></label>
      <label class="ds-form-check"><input type="checkbox" name="consent" required /><span>Einverständnis zur Datenverarbeitung gemäß Datenschutzerklärung.</span></label>
      <button type="submit" class="ds-cta ds-form-submit">Anfrage senden →</button>
    </form>
  </div>
</section>
